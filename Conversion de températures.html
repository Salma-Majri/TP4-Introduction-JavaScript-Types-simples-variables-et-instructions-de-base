<body>
<script>
var tempF=parseFloat(prompt("Saisir une température en Fahrenheit"));
console.log("Une température en Fahrenheit :", tempF)
function degreC(){
   var res=(5/9)*(tempF-32)
   return res
}
var tempC=degreC(tempF)
console.log("cette température équivaut a", tempC,"degrés Celsius")

</script>
</body>
